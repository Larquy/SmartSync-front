<div class="page" id="emergency">
    <div class="header">
        <div class="header-left">
            <div class="back-btn" onclick="showPage('chat')">‹</div>
            <h2 class="header-title">紧急求助</h2>
        </div>
    </div>
    
    <div class="emergency-container">
        <div class="emergency-icon-wrapper">
            <div class="emergency-icon">SOS</div>
            <div class="emergency-ring"></div>
        </div>
        <h2 class="emergency-title">紧急求助</h2>
        <p class="emergency-desc">如需帮助，请立即呼叫医护人员</p>
        <p class="emergency-hint">求助将优先通知最近的医护人员</p>
        
        <button class="btn btn-danger btn-large" onclick="confirmEmergency()">确认求助</button>
        <button class="btn btn-secondary btn-block" onclick="showPage('chat')">取消</button>
    </div>
    
    <div class="emergency-info">
        <div class="info-card">
            <div class="info-icon">📍</div>
            <div class="info-content">
                <div class="info-title">当前位置</div>
                <div class="info-desc">3楼 心电图室门口</div>
            </div>
        </div>
        <div class="info-card">
            <div class="info-icon">⏱️</div>
            <div class="info-content">
                <div class="info-title">预计到达时间</div>
                <div class="info-desc">医护人员将在2分钟内到达</div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <button class="nav-item" onclick="showPage('overview')">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">首页</span>
        </button>
        <button class="nav-item" onclick="showPage('reports')">
            <span class="nav-icon">📋</span>
            <span class="nav-text">报告</span>
        </button>
        <button class="nav-item" onclick="showPage('reminder')">
            <span class="nav-icon">📅</span>
            <span class="nav-text">复诊</span>
        </button>
        <button class="nav-item" onclick="showPage('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-text">我的</span>
        </button>
    </div>
</div>
