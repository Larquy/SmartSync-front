<div class="page" id="family-mode">
    <div class="header">
        <div class="header-left">
            <div class="back-btn" onclick="showPage('overview')">‹</div>
            <h2 class="header-title">家属关怀模式</h2>
        </div>
    </div>
    
    <div class="mode-card">
        <div class="mode-header">
            <div class="mode-icon">👨‍👩‍👧</div>
            <div class="mode-title">关怀模式设置</div>
        </div>
        
        <div class="mode-item">
            <div class="mode-info">
                <div class="mode-name">快捷模式</div>
                <div class="mode-desc">简化操作流程，一键完成常用功能</div>
            </div>
            <div class="toggle-wrapper">
                <label class="toggle-switch">
                    <input type="checkbox" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        
        <div class="mode-item">
            <div class="mode-info">
                <div class="mode-name">关怀模式（需绑定）</div>
                <div class="mode-desc">家属可查看就诊进度和位置信息</div>
            </div>
            <div class="toggle-wrapper">
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>
    
    <div class="bind-section">
        <h3 class="section-title">绑定家人手环</h3>
        <div class="bind-desc">为家人绑定手环后，您可以实时查看他们的就诊进度和位置信息。</div>
        
        <div class="family-list">
            <div class="family-item">
                <div class="family-avatar">👨</div>
                <div class="family-info">
                    <div class="family-name">王小明</div>
                    <div class="family-relation">儿子 · 138****5678</div>
                </div>
                <div class="family-status connected">已关联</div>
            </div>
        </div>
        
        <button class="btn btn-primary btn-block" onclick="bindFamily()">绑定手环</button>
    </div>
    
    <div class="features-section">
        <h3 class="section-title">关怀功能</h3>
        <div class="features-grid">
            <button class="feature-card" onclick="showPage('trace')">
                <div class="feature-icon">📍</div>
                <div class="feature-name">实时位置</div>
                <div class="feature-desc">查看家人实时位置</div>
            </button>
            <button class="feature-card" onclick="showPage('reports')">
                <div class="feature-icon">📋</div>
                <div class="feature-name">报告查看</div>
                <div class="feature-desc">查看就诊报告</div>
            </button>
            <button class="feature-card" onclick="showPage('reminder')">
                <div class="feature-icon">⏰</div>
                <div class="feature-name">提醒设置</div>
                <div class="feature-desc">设置复诊提醒</div>
            </button>
        </div>
    </div>
    
    <div class="tips-card">
        <div class="tips-icon">📱</div>
        <div class="tips-content">
            <div class="tips-title">家属关怀提示</div>
            <div class="tips-desc">家属可通过触碰手环获取您的就诊动态</div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <button class="nav-item" onclick="showPage('overview')">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">首页</span>
        </button>
        <button class="nav-item" onclick="showPage('reports')">
            <span class="nav-icon">📋</span>
            <span class="nav-text">报告</span>
        </button>
        <button class="nav-item" onclick="showPage('reminder')">
            <span class="nav-icon">📅</span>
            <span class="nav-text">复诊</span>
        </button>
        <button class="nav-item" onclick="showPage('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-text">我的</span>
        </button>
    </div>
</div>
