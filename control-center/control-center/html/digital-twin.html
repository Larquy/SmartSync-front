<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院区数字孪生 - 智环引诊</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/digital-twin.css">
</head>

<body>
    <div class="twin-container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <!-- Logo区域 -->
            <div class="sidebar-section logo-section">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
                                fill="#4285f4" />
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>智环引诊</h1>
                        <p>数字孪生</p>
                    </div>
                </div>
            </div>

            <!-- 主导航 -->
            <div class="sidebar-section nav-section">
                <h3 class="section-title">导航</h3>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <span class="nav-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor" />
                                </svg>
                            </span>
                            <span class="nav-text">返回首页</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="digital-twin.html" class="nav-link active">
                            <span class="nav-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path
                                        d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"
                                        fill="currentColor" />
                                </svg>
                            </span>
                            <span class="nav-text">数字孪生</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="dispatch.html" class="nav-link">
                            <span class="nav-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path d="M3 13h2v8H3v-8zm4-5h2v13H7V8zm4-5h2v18h-2V3zm4 5h2v13h-2V8zm4-5h2v18h-2V3z"
                                        fill="currentColor" />
                                </svg>
                            </span>
                            <span class="nav-text">调度管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="emergency.html" class="nav-link">
                            <span class="nav-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path
                                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                                        fill="currentColor" />
                                </svg>
                            </span>
                            <span class="nav-text">紧急情况</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 楼层选择 -->
            <div class="sidebar-section floor-section">
                <h3 class="section-title">楼层选择</h3>
                <div class="floor-selector">
                    <button class="floor-btn active" data-floor="F1">
                        <span class="floor-number">1</span>
                        <span class="floor-label">一层</span>
                    </button>
                    <button class="floor-btn" data-floor="F2">
                        <span class="floor-number">2</span>
                        <span class="floor-label">二层</span>
                    </button>
                    <button class="floor-btn" data-floor="F3">
                        <span class="floor-number">3</span>
                        <span class="floor-label">三层</span>
                    </button>
                </div>
            </div>

            <!-- 实时统计 -->
            <div class="sidebar-section stats-section">
                <h3 class="section-title">实时统计</h3>
                <div class="stats-container">
                    <div class="stat-item">
                        <div class="stat-icon-wrapper blue">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
                                    fill="white" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">在线子站</span>
                            <span class="stat-value" id="onlineSubstations">24/28</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon-wrapper green">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                                    fill="white" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">活跃患者</span>
                            <span class="stat-value" id="activePatients">156</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon-wrapper orange">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                                    fill="white" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">平均拥挤度</span>
                            <span class="stat-value" id="avgCrowd">68%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 热力图设置 -->
            <div class="sidebar-section">
                <h3 class="section-title">热力图设置</h3>
                <div class="heatmap-controls">
                    <div class="control-group">
                        <label>热力半径</label>
                        <input type="range" id="heatmapRadius" min="20" max="150" value="60"
                            onchange="updateHeatmapParams({radius: parseInt(this.value)})">
                        <span id="heatmapRadiusValue">60px</span>
                    </div>

                    <div class="control-group">
                        <label>热力强度</label>
                        <input type="range" id="heatmapIntensity" min="10" max="100" value="80"
                            onchange="updateHeatmapParams({intensity: parseInt(this.value) / 100})">
                        <span id="heatmapIntensityValue">80%</span>
                    </div>

                    <div class="control-group">
                        <label>热力样式</label>
                        <select id="heatmapGradient" onchange="updateHeatmapParams({gradient: this.value})">
                            <option value="soft" selected>柔和渐变（推荐）</option>
                            <option value="classic">经典渐变</option>
                            <option value="ocean">海洋渐变</option>
                            <option value="warm">暖色调渐变</option>
                            <option value="cyberpunk">赛博朋克</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="heatmapAnimation" checked
                                onchange="updateHeatmapParams({animation: this.checked})">
                            动态效果
                        </label>
                        <div class="heatmap-animation-indicator" id="heatmapIndicator" style="display: none;">
                            <span class="heatmap-animation-dot"></span>
                            <span>动画运行中</span>
                        </div>
                    </div>

                    <button onclick="resetHeatmapParams()" class="btn-reset">重置参数</button>
                </div>
            </div>

            <!-- 系统状态 -->
            <div class="sidebar-section status-section">
                <div class="system-status">
                    <span class="status-dot online"></span>
                    <span class="status-text">系统运行正常</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部工具栏 -->
            <header class="twin-header">
                <div class="header-left">
                    <h2 id="currentFloorTitle">F1 层 - 门诊楼</h2>
                    <span class="twin-time" id="currentTime">2026-05-27 14:30:25</span>
                </div>
                <div class="header-right">
                    <div class="view-controls">
                        <button class="control-btn" id="toggleNodes" title="显示/隐藏节点">
                            <span>节点</span>
                        </button>
                        <button class="control-btn" id="togglePaths" title="显示/隐藏路径">
                            <span>路径</span>
                        </button>
                        <button class="control-btn" id="toggleHeatmap" title="显示/隐藏热力图">
                            <span>热力图</span>
                        </button>
                    </div>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomIn" title="放大">+</button>
                        <button class="zoom-btn" id="zoomOut" title="缩小">-</button>
                        <button class="zoom-btn" id="resetView" title="重置视图">⟲</button>
                    </div>
                </div>
            </header>

            <!-- Three.js 画布容器 -->
            <div id="twin-canvas-container">
                <div id="loading-overlay">
                    <div class="spinner"></div>
                    <p>加载数字孪生模型...</p>
                </div>
            </div>

            <!-- 节点信息面板 -->
            <div class="node-info-panel" id="nodeInfoPanel" style="display: none;">
                <div class="panel-header">
                    <h3 id="nodeName">节点信息</h3>
                    <button class="close-btn" id="closeNodePanel">×</button>
                </div>
                <div class="panel-content">
                    <div class="info-row">
                        <span class="info-label">节点ID:</span>
                        <span class="info-value" id="nodeId">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">类型:</span>
                        <span class="info-value" id="nodeType">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">坐标:</span>
                        <span class="info-value" id="nodeCoords">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">当前人数:</span>
                        <span class="info-value" id="nodePeopleCount">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">拥挤度:</span>
                        <span class="info-value" id="nodeCrowdLevel">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">子站状态:</span>
                        <span class="info-value" id="nodeSubstationStatus">-</span>
                    </div>
                </div>
            </div>

            <!-- 图例 -->
            <div class="legend-panel">
                <h4>图例</h4>
                <div class="legend-items">
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #4285f4;"></span>
                        <span>导诊台/护士站</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #51cf66;"></span>
                        <span>科室入口</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #fcc419;"></span>
                        <span>边缘子站</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #ff6b6b;"></span>
                        <span>紧急区域</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #868e96;"></span>
                        <span>普通节点</span>
                    </div>
                </div>
            </div>

            <!-- 工具提示 -->
            <div class="tooltip" id="tooltip" style="display: none;"></div>
        </main>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/digital-twin.js"></script>
</body>

</html>
