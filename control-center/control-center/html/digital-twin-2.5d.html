<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院数字孪生 - 2.5D视图 | 智环引诊</title>
    <link rel="stylesheet" href="../css/digital-twin-2.5d.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div class="twin-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <a href="index.html" class="back-btn" title="返回首页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5m7-7l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </a>
                <div>
                    <h1>医院数字孪生系统</h1>
                    <span class="subtitle">2.5D 可视化 · 实时态势感知</span>
                </div>
            </div>

            <!-- 楼层选择器 -->
            <div class="floor-selector">
                <button class="floor-btn active" data-floor="F1">
                    <span class="floor-num">1F</span>
                    <span class="floor-name">门诊层</span>
                </button>
                <button class="floor-btn" data-floor="F2">
                    <span class="floor-num">2F</span>
                    <span class="floor-name">检查层</span>
                </button>
                <button class="floor-btn" data-floor="F3">
                    <span class="floor-num">3F</span>
                    <span class="floor-name">住院层</span>
                </button>
            </div>

            <div class="toolbar-center">
                <div class="zoom-controls">
                    <button id="zoomOut" class="zoom-btn" title="缩小">−</button>
                    <span id="zoomLevel" class="zoom-value">100%</span>
                    <button id="zoomIn" class="zoom-btn" title="放大">+</button>
                    <span class="zoom-divider"></span>
                    <button id="resetView" class="zoom-btn" title="重置视图">⟲</button>
                </div>
            </div>

            <div class="toolbar-right">
                <div class="toggle-group">
                    <button id="toggleWalls" class="toggle-btn active" title="显示/隐藏墙体">
                        <span class="toggle-icon"></span> 墙体
                    </button>
                    <button id="toggleDepts" class="toggle-btn active" title="显示/隐藏科室">
                        <span class="toggle-icon"></span> 科室
                    </button>
                    <button id="toggleNodes" class="toggle-btn active" title="显示/隐藏节点">
                        <span class="toggle-icon"></span> 节点
                    </button>
                    <button id="toggleEdges" class="toggle-btn active" title="显示/隐藏路径">
                        <span class="toggle-icon"></span> 路径
                    </button>
                    <button id="togglePatients" class="toggle-btn active" title="显示/隐藏患者">
                        <span class="toggle-icon"></span> 患者
                    </button>
                    <button id="toggleHeatmap" class="toggle-btn" title="显示/隐藏热力图">
                        <span class="toggle-icon"></span> 热力
                    </button>
                </div>
                <div class="status-badge">
                    <span class="status-dot online"></span>
                    <span>实时监控中</span>
                </div>
            </div>
        </header>

        <!-- 主视图区域 -->
        <main class="main-content">
            <!-- 左侧图例面板 -->
            <aside class="side-panel left-panel">
                <div class="panel-section">
                    <h3 class="panel-title">图例</h3>
                    <div class="legend-list">
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#3b82f6"></span>
                            <span>门诊区域</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#0ea5e9"></span>
                            <span>内科区域</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#06b6d4"></span>
                            <span>外科区域</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#14b8a6"></span>
                            <span>儿科区域</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#8b5cf6"></span>
                            <span>妇科区域</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#6366f1"></span>
                            <span>放射科</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#34d399"></span>
                            <span>检验科</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-swatch" style="background:#60a5fa"></span>
                            <span>药房</span>
                        </div>
                    </div>
                </div>
                <div class="panel-divider"></div>
                <div class="panel-section">
                    <h3 class="panel-title">节点类型</h3>
                    <div class="legend-list">
                        <div class="legend-row">
                            <span class="legend-dot" style="background:#f59e0b"></span>
                            <span>边缘子站</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-dot" style="background:#2563eb"></span>
                            <span>护士站</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-dot" style="background:#ef4444"></span>
                            <span>紧急求助点</span>
                        </div>
                    </div>
                </div>
                <div class="panel-divider"></div>
                <div class="panel-section">
                    <h3 class="panel-title">患者类型</h3>
                    <div class="legend-list">
                        <div class="legend-row">
                            <span class="legend-dot patient" style="background:#3b82f6"></span>
                            <span>门诊患者</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-dot patient" style="background:#10b981"></span>
                            <span>住院患者</span>
                        </div>
                        <div class="legend-row">
                            <span class="legend-dot patient" style="background:#ef4444"></span>
                            <span>急诊患者</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 中心画布 -->
            <div id="twinCanvas" class="canvas-container">
                <div class="canvas-hint">
                    <span> 拖拽平移</span>
                    <span> 滚轮缩放</span>
                    <span> 双击查看详情</span>
                </div>
            </div>

            <!-- 右侧信息面板 -->
            <aside class="side-panel right-panel" id="infoPanel">
                <div class="panel-header">
                    <h3>信息面板</h3>
                </div>
                <div class="panel-body" id="panelContent">
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <p>双击地图上的科室或患者<br>查看详细信息</p>
                    </div>
                </div>

                <!-- 实时统计 -->
                <div class="panel-section stats-section">
                    <h3 class="panel-title">实时统计</h3>
                    <div class="mini-stats">
                        <div class="mini-stat">
                            <span class="mini-stat-val">28</span>
                            <span class="mini-stat-lbl">子站在线</span>
                        </div>
                        <div class="mini-stat">
                            <span class="mini-stat-val">1,247</span>
                            <span class="mini-stat-lbl">在院患者</span>
                        </div>
                        <div class="mini-stat">
                            <span class="mini-stat-val">78%</span>
                            <span class="mini-stat-lbl">科室利用率</span>
                        </div>
                        <div class="mini-stat alert">
                            <span class="mini-stat-val">3</span>
                            <span class="mini-stat-lbl">待处理警报</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- 科室信息浮层 -->
        <div id="deptCard" class="info-card hidden">
            <div class="card-header">
                <span id="deptName"></span>
                <button class="card-close">✕</button>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <span class="label">位置坐标</span>
                    <span class="value" id="deptLocation"></span>
                </div>
                <div class="info-row">
                    <span class="label">当值医生</span>
                    <span class="value" id="deptDoctors"></span>
                </div>
                <div class="info-row">
                    <span class="label">可用床位</span>
                    <span class="value" id="deptBeds"></span>
                </div>
                <div class="info-row">
                    <span class="label">运行状态</span>
                    <span class="value status" id="deptStatus"></span>
                </div>
                <div class="card-actions">
                    <button id="viewDeptDetail" class="action-btn">查看详情</button>
                    <button class="action-btn primary">导航至此</button>
                </div>
            </div>
        </div>

        <!-- 患者信息浮层 -->
        <div id="patientCard" class="info-card hidden">
            <div class="card-header patient-header">
                <span id="patientName"></span>
                <button class="card-close">✕</button>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <span class="label">性别</span>
                    <span class="value" id="patientGender"></span>
                </div>
                <div class="info-row">
                    <span class="label">年龄</span>
                    <span class="value" id="patientAge"></span>
                </div>
                <div class="info-row">
                    <span class="label">患者类型</span>
                    <span class="value" id="patientType"></span>
                </div>
                <div class="info-row">
                    <span class="label">当前状态</span>
                    <span class="value status" id="patientStatus"></span>
                </div>
                <div class="info-row">
                    <span class="label">目标科室</span>
                    <span class="value" id="patientDept"></span>
                </div>
                <div class="info-row">
                    <span class="label">登记时间</span>
                    <span class="value" id="patientTime"></span>
                </div>
                <div class="card-actions">
                    <button id="viewProfile" class="action-btn">查看档案</button>
                    <button id="viewRoute" class="action-btn primary">规划路径</button>
                </div>
            </div>
        </div>

        <!-- 路径规划面板 -->
        <div id="routePanel" class="route-panel hidden">
            <div class="panel-header">
                <h3> 路径规划</h3>
                <button id="closeRoute" class="close-btn">✕</button>
            </div>
            <div class="route-content">
                <div class="route-summary">
                    <div class="route-item">
                        <span class="route-label">起点</span>
                        <span class="route-value" id="routeStart">—</span>
                    </div>
                    <div class="route-item">
                        <span class="route-label">终点</span>
                        <span class="route-value" id="routeEnd">—</span>
                    </div>
                    <div class="route-item">
                        <span class="route-label">距离</span>
                        <span class="route-value" id="routeDistance">—</span>
                    </div>
                    <div class="route-item">
                        <span class="route-label">预计时间</span>
                        <span class="route-value" id="routeTime">—</span>
                    </div>
                </div>
                <div id="routeSteps" class="route-steps"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { OptimizedTwinEngine } from '../js/digital-twin-2.5d.js';
        window.twinEngine = new OptimizedTwinEngine('twinCanvas', {
            dataPath: '../../digital-twin/JJI54559656769/'
        });
    </script>
</body>

</html>
